<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA hack for project sites (username.github.io/<repo>/).
      // Must match the repo name and your Vite base path (e.g. /portfolio/).
      var REPO = 'portfolio';
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/' + REPO + '/?p=' +
        encodeURIComponent(l.pathname + l.search) + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
